<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบอนุมัติการลา (Admin)</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }
    .glass-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .status-pending { background-color: #fef3c7; color: #92400e; }
    .status-approved { background-color: #dcfce7; color: #166534; }
    .status-rejected { background-color: #fee2e2; color: #991b1b; }
  </style>
</head>
<body class="h-full">
  <div class="min-h-full">
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-cyan-500 flex items-center justify-center">
              <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-white font-bold text-lg">จัดการการลา (Admin)</h1>
          </div>
          <button onclick="fetchLeaves()" class="text-slate-300 hover:text-white flex items-center gap-2 text-sm bg-slate-800 px-3 py-2 rounded-lg">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> รีเฟรชข้อมูล
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 px-4 sm:px-0">
        <div class="glass-card rounded-xl p-6">
          <p class="text-sm font-medium text-slate-500">รออนุมัติ</p>
          <p id="countPending" class="text-3xl font-bold text-amber-500">0</p>
        </div>
        <div class="glass-card rounded-xl p-6">
          <p class="text-sm font-medium text-slate-500">อนุมัติแล้ว</p>
          <p id="countApproved" class="text-3xl font-bold text-emerald-500">0</p>
        </div>
        <div class="glass-card rounded-xl p-6">
          <p class="text-sm font-medium text-slate-500">รายการทั้งหมด</p>
          <p id="countTotal" class="text-3xl font-bold text-slate-900">0</p>
        </div>
      </div>

      <div class="px-4 sm:px-0">
        <div class="glass-card rounded-2xl overflow-hidden">
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
              <thead class="bg-slate-50">
                <tr>
                  <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">ผู้ขอลา</th>
                  <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">ประเภท/เหตุผล</th>
                  <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">วันที่ลา</th>
                  <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">สถานะ</th>
                  <th class="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase">จัดการ</th>
                </tr>
              </thead>
              <tbody id="leaveTableBody" class="bg-white divide-y divide-slate-200">
                </tbody>
            </table>
          </div>
          <div id="loader" class="hidden py-10 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-cyan-500 border-t-transparent"></div>
            <p class="mt-2 text-slate-500">กำลังโหลดข้อมูล...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyGlYXxM_bIDx_DRISYcHkLvR768feDRJO-k5QkErEU1JZwzbHK6j9sB_v-GlcfpePwQ/exec";

    async function fetchLeaves() {
      const loader = document.getElementById('loader');
      const tbody = document.getElementById('leaveTableBody');
      loader.classList.remove('hidden');
      tbody.innerHTML = '';

      try {
        const response = await fetch(WEB_APP_URL + "?action=getList");
        const data = await response.json();
        renderTable(data);
      } catch (e) {
        console.error("Fetch error:", e);
      } finally {
        loader.classList.add('hidden');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('leaveTableBody');
      let p = 0, a = 0;
      
      data.forEach((item, index) => {
        if(item.status === 'รออนุมัติ') p++;
        if(item.status === 'อนุมัติแล้ว') a++;

        const row = document.createElement('tr');
        row.className = "hover:bg-slate-50 transition";
        row.innerHTML = `
          <td class="px-6 py-4">
            <div class="text-sm font-bold text-slate-900">${item.full_name}</div>
            <div class="text-xs text-slate-500">${item.position}</div>
          </td>
          <td class="px-6 py-4">
            <div class="text-sm text-slate-900 font-medium">${item.leave_type}</div>
            <div class="text-xs text-slate-500 truncate max-w-[150px]">${item.reason}</div>
          </td>
          <td class="px-6 py-4">
            <div class="text-sm text-slate-900">${item.start_date} - ${item.end_date}</div>
            <div class="text-xs text-cyan-600 font-bold">${item.total_days} วัน</div>
          </td>
          <td class="px-6 py-4">
            <span class="px-2.5 py-1 rounded-full text-xs font-bold ${getStatusClass(item.status)}">
              ${item.status}
            </span>
          </td>
          <td class="px-6 py-4 text-right">
            ${item.status === 'รออนุมัติ' ? `
              <button onclick="updateStatus(${index + 2}, 'อนุมัติแล้ว')" class="text-emerald-600 hover:bg-emerald-50 p-2 rounded-lg transition" title="อนุมัติ">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
              </button>
              <button onclick="updateStatus(${index + 2}, 'ไม่อนุมัติ')" class="text-red-600 hover:bg-red-50 p-2 rounded-lg transition" title="ปฏิเสธ">
                <i data-lucide="x-circle" class="w-5 h-5"></i>
              </button>
            ` : `<span class="text-slate-300 text-xs">- ดำเนินการแล้ว -</span>`}
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('countPending').textContent = p;
      document.getElementById('countApproved').textContent = a;
      document.getElementById('countTotal').textContent = data.length;
      lucide.createIcons();
    }

    function getStatusClass(status) {
      if(status === 'รออนุมัติ') return 'status-pending';
      if(status === 'อนุมัติแล้ว') return 'status-approved';
      return 'status-rejected';
    }

    async function updateStatus(rowId, newStatus) {
      if(!confirm(`ยืนยันการเปลี่ยนสถานะเป็น: ${newStatus}?`)) return;
      
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateStatus', row: rowId, status: newStatus })
        });
        const res = await response.json();
        if(res.isOk) {
          alert("อัปเดตสถานะสำเร็จ!");
          fetchLeaves();
        }
      } catch (e) {
        alert("เกิดข้อผิดพลาดในการอัปเดต");
      }
    }

    window.onload = fetchLeaves;
  </script>
</body>
</html>
