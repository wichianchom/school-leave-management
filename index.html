<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบส่งแผนการจัดการเรียนรู้</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { heading: ['Kanit', 'sans-serif'], body: ['Kanit', 'sans-serif'] } } } }
  </script>
  <style>
    html, body { height: 100%; margin: 0; }
    * { font-family: 'Kanit', sans-serif; }
    h1,h2,h3,h4,h5,h6,.font-heading { font-family: 'Kanit', sans-serif; }
    .app-bg { background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 50%, #f5f5f5 100%); }
    .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(200,200,200,0.3); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .nav-btn { transition: all 0.3s ease; position: relative; overflow: hidden; color: #666; }
    .nav-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: linear-gradient(90deg, #2563eb, #7c3aed); transition: all 0.3s ease; transform: translateX(-50%); }
    .nav-btn.active::after, .nav-btn:hover::after { width: 80%; }
    .nav-btn.active, .nav-btn:hover { color: #2563eb; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .toast-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 24px; border-radius: 12px; background: linear-gradient(135deg, #10b981, #059669); color: white; font-weight: 600; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1} to{opacity:0} }
    .bar-animate { animation: barGrow 0.8s ease; }
    @keyframes barGrow { from{height:0} to{height:var(--bar-h)} }
    .stat-card { transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-4px); }
    input[type="text"], input[type="url"], select, textarea { font-size: 16px !important; }
    @media print { .no-print { display: none !important; } .print-only { display: block !important; } body { background: white !important; } }
  </style>
 </head>
 <body class="h-full app-bg text-gray-800 overflow-auto">
  <div id="app" class="w-full h-full flex flex-col">
   <nav class="no-print sticky top-0 z-50 bg-white/95 backdrop-blur-xl border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-3">
     <div class="flex items-center justify-between h-14">
      <div class="flex items-center gap-2">
       <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
        <i data-lucide="file-check" class="w-4 h-4 text-white"></i>
       </div><span id="navTitle" class="font-heading font-bold text-sm text-gray-800 hidden sm:block">ระบบให้คะแนนแผนการจัดการเรียนรู้</span>
      </div>
    <div class="flex gap-1 text-xs sm:text-sm overflow-x-auto">
       <button onclick="navigateTo('submit')" data-nav="submit" class="nav-btn active px-2 sm:px-3 py-2 rounded-lg flex items-center gap-1"><i data-lucide="send" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">ส่งแผน</span></button>
       <button onclick="navigateTo('status')" data-nav="status" class="nav-btn px-2 sm:px-3 py-2 rounded-lg flex items-center gap-1"><i data-lucide="search" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">ตรวจสอบ</span></button>
       <button onclick="navigateTo('summary')" data-nav="summary" class="nav-btn px-2 sm:px-3 py-2 rounded-lg flex items-center gap-1"><i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">สรุปผล</span></button>
       
       <a href="admin.html" class="nav-btn px-2 sm:px-3 py-2 rounded-lg flex items-center gap-1 text-gray-600 hover:text-blue-600">
        <i data-lucide="shield" class="w-3.5 h-3.5"></i>
        <span class="hidden sm:inline">Admin</span>
       </a>
      </div>
     </div>
    </div>
   </nav>

   <div class="flex-1 overflow-auto">
    <div id="page-submit" class="page fade-in max-w-2xl mx-auto p-4 sm:p-6">
     <div class="glass-card rounded-2xl p-6 sm:p-8">
      <div class="text-center mb-6">
       <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mb-3">
        <i data-lucide="file-plus" class="w-8 h-8"></i>
       </div>
       <h1 class="font-heading text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">ส่งแผนการจัดการเรียนรู้</h1>
       <p id="schoolNameDisplay" class="text-gray-600 text-sm mt-1"></p>
      </div>
      <form id="submitForm" class="space-y-4">
       <div><label for="f_name" class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล</label> <input type="text" id="f_name" required class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500" placeholder="กรอกชื่อ-นามสกุล"></div>
       <div class="grid grid-cols-2 gap-3">
        <div><label for="f_grade" class="block text-sm font-medium text-gray-700 mb-1">กลุ่มชั้น</label> <select id="f_grade" required class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500"><option value="">เลือกกลุ่มชั้น</option><option value="ปฐมวัย (อนุบาล 3)">ปฐมวัย (อนุบาล 3)</option><option value="ป.1">ป.1</option><option value="ป.2">ป.2</option><option value="ป.3">ป.3</option><option value="ป.4">ป.4</option><option value="ป.5">ป.5</option><option value="ป.6">ป.6</option></select></div>
        <div><label for="f_class" class="block text-sm font-medium text-gray-700 mb-1">ห้องเรียนที่สอน</label> <input type="text" id="f_class" required class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500" placeholder="เช่น 1/1"></div>
       </div>
       <div><label for="f_subject" class="block text-sm font-medium text-gray-700 mb-1">รายวิชาที่สอน</label> <input type="text" id="f_subject" required class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500" placeholder="กรอกรายวิชา"></div>
       <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">วัน เดือน ปี ที่ส่งแผน</label>
        <div class="grid grid-cols-3 gap-2">
         <select id="f_day" required class="w-full px-3 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500"><option value="">วัน</option></select>
         <select id="f_month" required class="w-full px-3 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500"><option value="">เดือน</option></select>
         <select id="f_year" required class="w-full px-3 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500"><option value="">ปี</option></select>
        </div>
       </div>
       <div><label for="f_link" class="block text-sm font-medium text-gray-700 mb-1">ลิงก์แผนการสอน</label> <input type="url" id="f_link" required class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-blue-500" placeholder="https://..."></div>
       <button type="submit" id="submitBtn" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 font-heading font-bold text-lg text-white transition-all"><span id="submitBtnText">ส่งแผนการสอน</span><span id="submitBtnLoading" class="hidden">กำลังส่ง...</span></button>
      </form>
     </div>
    </div>

    <div id="page-status" class="page hidden fade-in max-w-4xl mx-auto p-4 sm:p-6">
     <div class="glass-card rounded-2xl p-6 sm:p-8">
      <div class="text-center mb-6"><h1 class="font-heading text-2xl font-bold bg-gradient-to-r from-emerald-600 to-cyan-600 bg-clip-text text-transparent">ตรวจสอบสถานะการส่งแผน</h1></div>
      <div class="flex gap-2 mb-6">
       <input type="text" id="searchName" class="flex-1 px-4 py-3 rounded-xl bg-white border border-gray-300 focus:ring-2 focus:ring-emerald-500" placeholder="ค้นหาชื่อ-นามสกุล...">
       <button onclick="searchStatus()" class="px-6 py-3 rounded-xl bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 font-bold text-white transition-all"><i data-lucide="search" class="w-5 h-5"></i></button>
      </div>
      <div id="statusResults"></div>
     </div>
    </div>

    <div id="page-summary" class="page hidden fade-in max-w-6xl mx-auto p-4 sm:p-6">
     <div class="text-center mb-6"><h1 class="font-heading text-2xl font-bold bg-gradient-to-r from-amber-600 to-orange-600 bg-clip-text text-transparent">สรุปผลการส่งแผนการจัดการเรียนรู้</h1></div>
     <div id="summaryContent"></div>
    </div>
   </div>
  </div>

<script>
let allRecords = [];
const GRADES = ["ปฐมวัย (อนุบาล 3)","ป.1","ป.2","ป.3","ป.4","ป.5","ป.6"];
const MONTHS_TH = ["","มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

// ============ INIT GOOGLE SHEETS API ============
// ⚠️ นำ URL Web App ที่ได้จาก Google Apps Script มาวางในเครื่องหมายคำพูดด้านล่างนี้ ⚠️
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlgdnyW2g70MHA3H47KQ7xyXAQb9X3vLLvTLsPH32w3AccEtNUcT8jtP0cj_DD850T9A/exec"; 

window.dataSdk = {
  async init({ onDataChanged }) {
    this.onDataChanged = onDataChanged;
    await this.fetchData();
    return { isOk: true };
  },
  async fetchData() {
    try {
      const response = await fetch(SCRIPT_URL);
      const data = await response.json();
      allRecords = data || [];
      if (this.onDataChanged) this.onDataChanged(allRecords);
    } catch (error) { console.error("Error:", error); }
  },
  async create(record) {
    try {
      const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "create", record: record }) });
      const result = await response.json();
      if (result.isOk) await this.fetchData();
      return result;
    } catch (e) { return { isOk: false }; }
  }
  // index.html ไม่จำเป็นต้องมี update และ delete เพราะแอดมินเป็นคนจัดการ
};

// Data SDK Init
(async () => {
  await window.dataSdk.init({
    onDataChanged(data) {
      allRecords = data || [];
      if(document.getElementById('page-status').style.display !== 'none' && !document.getElementById('page-status').classList.contains('hidden')) searchStatus();
      if(document.getElementById('page-summary').style.display !== 'none' && !document.getElementById('page-summary').classList.contains('hidden')) renderSummary();
    }
  });
})();

// Populate Dates
(function(){
  const dayEl = document.getElementById('f_day'); const monthEl = document.getElementById('f_month'); const yearEl = document.getElementById('f_year');
  for(let d=1;d<=31;d++) { const o=document.createElement('option'); o.value=d; o.textContent=d; dayEl.appendChild(o); }
  for(let m=1;m<=12;m++) { const o=document.createElement('option'); o.value=m; o.textContent=MONTHS_TH[m]; monthEl.appendChild(o); }
  const currentBE = new Date().getFullYear()+543;
  for(let y=currentBE;y>=currentBE-5;y--) { const o=document.createElement('option'); o.value=y; o.textContent=y; yearEl.appendChild(o); }
})();

function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('[data-nav]').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-nav="${page}"]`).classList.add('active');
  document.getElementById('page-'+page).classList.remove('hidden');
  if(page === 'summary') renderSummary();
  lucide.createIcons();
}

function showToast(msg, color) {
  const t = document.createElement('div'); t.className = 'toast-msg'; if(color) t.style.background = color;
  t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}

document.getElementById('submitForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn'); btn.disabled = true;
  document.getElementById('submitBtnText').classList.add('hidden'); document.getElementById('submitBtnLoading').classList.remove('hidden');
  
  const record = {
    type: 'plan', name: document.getElementById('f_name').value.trim(), grade: document.getElementById('f_grade').value,
    classroom: document.getElementById('f_class').value.trim(), subject: document.getElementById('f_subject').value.trim(),
    date_day: document.getElementById('f_day').value, date_month: document.getElementById('f_month').value, date_year: document.getElementById('f_year').value,
    link: document.getElementById('f_link').value.trim(), status: 'รออนุมัติ', score_obtained: 0, score_total: 50, score_percent: 0, score_avg10: 0, comment: '',
    c1:0,c2:0,c3:0,c4:0,c5:0,c6:0,c7:0,c8:0,c9:0,c10:0, submitted_at: new Date().toISOString()
  };
  const res = await window.dataSdk.create(record);
  btn.disabled = false; document.getElementById('submitBtnText').classList.remove('hidden'); document.getElementById('submitBtnLoading').classList.add('hidden');
  if(res.isOk) { showToast('ส่งแผนการสอนเรียบร้อยแล้ว ✓'); this.reset(); } 
  else { showToast('เกิดข้อผิดพลาด กรุณาลองใหม่','linear-gradient(135deg,#ef4444,#dc2626)'); }
});

function searchStatus() {
  const q = document.getElementById('searchName').value.trim().toLowerCase();
  const container = document.getElementById('statusResults');
  const filtered = q ? allRecords.filter(r => r.type==='plan' && r.name && r.name.toLowerCase().includes(q)) : allRecords.filter(r=>r.type==='plan');
  if(!filtered.length) { container.innerHTML = '<div class="text-center text-gray-400 py-8"><i data-lucide="inbox" class="w-12 h-12 mx-auto mb-2 opacity-50"></i><p>ไม่พบข้อมูล</p></div>'; lucide.createIcons(); return; }
  let html = '';
  filtered.forEach(r => {
    const dateStr = r.date_day + ' ' + MONTHS_TH[parseInt(r.date_month)||0] + ' ' + r.date_year;
    const isAppr = r.status === 'อนุมัติ';
    html += `<div class="glass-card rounded-xl p-5 mb-4"><div class="flex flex-wrap items-start justify-between gap-3 mb-4">
      <div><h3 class="font-heading font-bold text-lg text-gray-800">${esc(r.name)}</h3><p class="text-gray-600 text-sm">${esc(r.grade)} | ห้อง ${esc(r.classroom)} | ${esc(r.subject)}</p><p class="text-gray-500 text-xs mt-1">ส่งเมื่อ: ${dateStr}</p></div>
      <span class="px-3 py-1 rounded-full text-xs font-bold bg-gradient-to-r ${isAppr?'from-emerald-500 to-green-500':'from-amber-500 to-yellow-500'} text-white flex items-center gap-1"><i data-lucide="${isAppr?'check-circle':'clock'}" class="w-3.5 h-3.5"></i>${esc(r.status)}</span></div>
      ${isAppr ? `<div class="grid grid-cols-3 gap-3 mb-4"><div class="bg-blue-100 rounded-xl p-3 text-center"><div class="text-2xl font-heading font-extrabold text-blue-600">${r.score_obtained||0}/${r.score_total||50}</div><div class="text-xs text-gray-600">คะแนนที่ได้</div></div><div class="bg-purple-100 rounded-xl p-3 text-center"><div class="text-2xl font-heading font-extrabold text-purple-600">${(r.score_percent||0).toFixed(1)}%</div><div class="text-xs text-gray-600">ร้อยละ</div></div><div class="bg-emerald-100 rounded-xl p-3 text-center"><div class="text-2xl font-heading font-extrabold text-emerald-600">${(r.score_avg10||0).toFixed(2)}</div><div class="text-xs text-gray-600">เฉลี่ย 10</div></div></div>
      ${r.comment ? `<div class="bg-purple-50 rounded-xl p-4 border-l-4 border-purple-500"><p class="text-xs text-gray-600 mb-1 font-bold">ความคิดเห็นและข้อเสนอแนะผู้อำนวยการ/รองผู้อำนวยการ</p><p class="text-gray-800 text-sm">${esc(r.comment)}</p></div>` : ''}` : '<p class="text-gray-600 text-sm italic">รอการให้คะแนนจาก Admin</p>'}</div>`;
  });
  container.innerHTML = html; lucide.createIcons();
}

function renderSummary() {
  const plans = allRecords.filter(r => r.type === 'plan'); const approved = plans.filter(r => r.status === 'อนุมัติ');
  const container = document.getElementById('summaryContent');
  if(!plans.length) { container.innerHTML = '<div class="glass-card rounded-2xl p-8 text-center text-gray-400"><i data-lucide="bar-chart-3" class="w-16 h-16 mx-auto mb-3 opacity-30"></i><p>ยังไม่มีข้อมูล</p></div>'; lucide.createIcons(); return; }
  
  // Stats
  let html = `<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
    <div class="stat-card glass-card rounded-xl p-4 text-center"><div class="text-3xl font-heading font-extrabold text-blue-600">${plans.length}</div><div class="text-xs text-gray-600">แผนทั้งหมด</div></div>
    <div class="stat-card glass-card rounded-xl p-4 text-center"><div class="text-3xl font-heading font-extrabold text-emerald-600">${approved.length}</div><div class="text-xs text-gray-600">อนุมัติแล้ว</div></div>
    <div class="stat-card glass-card rounded-xl p-4 text-center"><div class="text-3xl font-heading font-extrabold text-amber-600">${plans.length - approved.length}</div><div class="text-xs text-gray-600">รออนุมัติ</div></div>
    <div class="stat-card glass-card rounded-xl p-4 text-center"><div class="text-3xl font-heading font-extrabold text-purple-600">${approved.length ? (approved.reduce((s,r)=>s+(r.score_avg10||0),0)/approved.length).toFixed(2) : '0'}</div><div class="text-xs text-gray-600">คะแนนเฉลี่ยรวม</div></div></div>`;
  
  // By grade
  html += `<div class="glass-card rounded-2xl p-6"><h2 class="font-heading font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="users" class="w-5 h-5 text-emerald-400"></i>รายชื่อแยกตามกลุ่มชั้น</h2>`;
  GRADES.forEach(g => {
    const gPlans = plans.filter(r=>r.grade===g); if(!gPlans.length) return;
    html += `<div class="mb-4"><h3 class="font-heading font-bold text-sm text-blue-600 mb-2 border-b border-gray-200 pb-1">${g} (${gPlans.length} คน)</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-gray-500 text-xs"><th class="text-left py-1 px-2">ชื่อ-นามสกุล</th><th class="text-center py-1 px-2">ร้อยละ</th><th class="text-center py-1 px-2">เฉลี่ย 10</th><th class="text-center py-1 px-2">สถานะ</th></tr></thead><tbody>`;
    gPlans.forEach(r => { html += `<tr class="border-t border-gray-100"><td class="py-1.5 px-2">${esc(r.name)}</td><td class="py-1.5 px-2 text-center">${(r.score_percent||0).toFixed(1)}%</td><td class="py-1.5 px-2 text-center font-bold text-blue-600">${(r.score_avg10||0).toFixed(2)}</td><td class="py-1.5 px-2 text-center"><span class="px-2 py-0.5 rounded-full text-xs ${r.status==='อนุมัติ'?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}">${r.status}</span></td></tr>`; });
    html += `</tbody></table></div></div>`;
  }); html += `</div>`;
  container.innerHTML = html; lucide.createIcons();
}
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
lucide.createIcons();
  </script>
 </body>
</html>
